<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美伊战争强度监控 - 实时仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .last-update {
            color: #8892b0;
            font-size: 0.9em;
        }
        .anomaly-banner {
            display: none;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-title {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #feca57;
        }
        .wii-display {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .wii-value {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .wii-value.extreme { color: #ff416c; }
        .wii-value.high { color: #ff6b6b; }
        .wii-value.medium { color: #feca57; }
        .wii-value.low { color: #4ade80; }
        .wii-level {
            font-size: 1.5em;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
        }
        .wii-level.extreme {
            background: #ff416c;
        }
        .wii-level.high {
            background: #ff6b6b;
        }
        .wii-level.medium {
            background: #feca57;
            color: #1a1a2e;
        }
        .wii-level.low {
            background: #4ade80;
            color: #1a1a2e;
        }
        .market-item {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
        .market-label {
            font-size: 0.9em;
            color: #8892b0;
            margin-bottom: 8px;
        }
        .market-probability {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .prob-bar {
            flex-grow: 1;
            height: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-right: 10px;
        }
        .prob-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        .prob-fill.high { background: linear-gradient(90deg, #ff416c, #ff4b2b); }
        .prob-fill.medium { background: linear-gradient(90deg, #feca57, #ff6b6b); }
        .prob-fill.low { background: linear-gradient(90deg, #4ade80, #22c55e); }
        .prob-value {
            font-size: 1.2em;
            font-weight: bold;
            min-width: 60px;
            text-align: right;
        }
        .change-indicator {
            font-size: 0.85em;
            margin-left: 10px;
        }
        .change-up { color: #ff416c; }
        .change-down { color: #4ade80; }
        .change-neutral { color: #8892b0; }
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        .chart-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #feca57;
        }
        .formula {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #8892b0;
            margin-top: 15px;
        }
        .status-normal {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 美伊战争强度监控</h1>
            <p class="last-update">最后更新: <span id="updateTime"></span></p>
        </div>

        <div id="anomalyBanner" class="anomaly-banner">
            ⚠️ 异常信号警告: <span id="anomalyDetail"></span>
        </div>

        <div id="statusNormal" class="status-normal">
            ✅ 系统正常 - 无异常信号
        </div>

        <div class="dashboard-grid">
            <div class="card wii-display">
                <div class="card-title">综合战争烈度指数 (WII)</div>
                <div class="wii-value extreme" id="wiiValue">30.1%</div>
                <div class="wii-level extreme" id="wiiLevel">极强</div>
                <div class="formula">
                    WII = P_april×0.4 + P_march×0.3 + P_kharg×0.2 - P_ceasefire×0.1
                </div>
            </div>

            <div class="card">
                <div class="card-title">关键市场概率</div>
                <div id="marketsContainer"></div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">📊 24小时 WII 趋势</div>
            <canvas id="wiiChart"></canvas>
        </div>

        <div class="chart-container">
            <div class="chart-title">📊 关键市场概率趋势</div>
            <canvas id="marketChart"></canvas>
        </div>
    </div>

    <script>
        const data = {
            timestamp: "2026-03-27T12:34:00+08:00",
            wii: 30.1,
            level: "极强",
            level_color: "red",
            markets: {
                "us_enter_iran_march31": {
                    label: "US forces enter Iran by March 31",
                    yes: 15.5,
                    no: 84.5
                },
                "us_enter_iran_april30": {
                    label: "US forces enter Iran by April 30",
                    yes: 62.5,
                    no: 37.5
                },
                "ceasefire_march31": {
                    label: "US x Iran ceasefire by March 31",
                    yes: 4.5,
                    no: 95.5
                },
                "kharg_island_march31": {
                    label: "Kharg Island no longer under Iranian control by March 31",
                    yes: 4.5,
                    no: 95.5
                }
            },
            changes_since_last: {
                "us_enter_iran_march31": -0.3,
                "us_enter_iran_april30": -0.3,
                "ceasefire_march31": 0.3,
                "kharg_island_march31": -0.8
            },
            anomaly: false,
            anomaly_detail: "无异常信号。所有核心指标1小时内变化均小于5%阈值。WII从31.0%降至30.1%,维持极强级别。",
            history: [
                {
                    timestamp: "2026-03-26T11:15:00+08:00",
                    wii: 29.9,
                    level: "高",
                    markets: {
                        us_enter_iran_march31: 19.5,
                        us_enter_iran_april30: 59.5,
                        ceasefire_march31: 12.5,
                        kharg_island_march31: 7.5
                    }
                },
                {
                    timestamp: "2026-03-26T13:20:00+08:00",
                    wii: 30.0,
                    level: "极强",
                    markets: {
                        us_enter_iran_march31: 20.5,
                        us_enter_iran_april30: 58.5,
                        ceasefire_march31: 12.5,
                        kharg_island_march31: 8.5
                    }
                },
                {
                    timestamp: "2026-03-26T14:18:00+08:00",
                    wii: 29.7,
                    level: "高",
                    markets: {
                        us_enter_iran_march31: 19.5,
                        us_enter_iran_april30: 58.5,
                        ceasefire_march31: 12.5,
                        kharg_island_march31: 8.5
                    }
                },
                {
                    timestamp: "2026-03-26T15:21:00+08:00",
                    wii: 29.5,
                    level: "高",
                    markets: {
                        us_enter_iran_march31: 19.5,
                        us_enter_iran_april30: 58.5,
                        ceasefire_march31: 12.5,
                        kharg_island_march31: 7.5
                    }
                },
                {
                    timestamp: "2026-03-26T16:35:50+08:00",
                    wii: 30.6,
                    level: "极强",
                    markets: {
                        us_enter_iran_march31: 21.5,
                        us_enter_iran_april30: 59.5,
                        ceasefire_march31: 11.5,
                        kharg_island_march31: 7.5
                    }
                },
                {
                    timestamp: "2026-03-26T17:36:27+08:00",
                    wii: 33.0,
                    level: "极强",
                    markets: {
                        us_enter_iran_march31: 23.5,
                        us_enter_iran_april30: 60.5,
                        ceasefire_march31: 12.5,
                        kharg_island_march31: 8.5
                    }
                },
                {
                    timestamp: "2026-03-27T08:39:00+08:00",
                    wii: 31.0,
                    level: "极强",
                    markets: {
                        us_enter_iran_march31: 17.5,
                        us_enter_iran_april30: 62.5,
                        ceasefire_march31: 5.5,
                        kharg_island_march31: 6.5
                    }
                },
                {
                    timestamp: "2026-03-27T08:45:00+08:00",
                    wii: 31.0,
                    level: "极强",
                    markets: {
                        us_enter_iran_march31: 17.5,
                        us_enter_iran_april30: 62.5,
                        ceasefire_march31: 5.5,
                        kharg_island_march31: 6.5
                    }
                },
                {
                    timestamp: "2026-03-27T10:55:18+08:00",
                    wii: 31.0,
                    level: "高",
                    markets: {
                        us_enter_iran_march31: 15.8,
                        us_enter_iran_april30: 62.8,
                        ceasefire_march31: 4.2,
                        kharg_island_march31: 5.3
                    }
                },
                {
                    timestamp: "2026-03-27T11:01:00+08:00",
                    wii: 30.5,
                    level: "极强",
                    markets: {
                        us_enter_iran_march31: 15.5,
                        us_enter_iran_april30: 62.5,
                        ceasefire_march31: 4.5,
                        kharg_island_march31: 6.5
                    }
                }
            ]
        };

        const marketLabels = {
            "us_enter_iran_march31": "🎯 3月底美军进入伊朗",
            "us_enter_iran_april30": "🎯 4月底美军进入伊朗",
            "ceasefire_march31": "🕊️ 3月底停火",
            "kharg_island_march31": "🏝️ 哈尔格岛失控"
        };

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getLevelClass(level) {
            const levelMap = {
                '极强': 'extreme',
                '高': 'high',
                '中': 'medium',
                '低': 'low'
            };
            return levelMap[level] || 'medium';
        }

        function getProbClass(prob) {
            if (prob >= 50) return 'high';
            if (prob >= 20) return 'medium';
            return 'low';
        }

        document.getElementById('updateTime').textContent = formatTime(data.timestamp);
        document.getElementById('wiiValue').textContent = data.wii.toFixed(1) + '%';
        document.getElementById('wiiValue').className = 'wii-value ' + getLevelClass(data.level);
        document.getElementById('wiiLevel').textContent = data.level;
        document.getElementById('wiiLevel').className = 'wii-level ' + getLevelClass(data.level);

        if (data.anomaly) {
            document.getElementById('anomalyBanner').style.display = 'block';
            document.getElementById('anomalyDetail').textContent = data.anomaly_detail;
            document.getElementById('statusNormal').style.display = 'none';
        }

        const marketsContainer = document.getElementById('marketsContainer');
        for (const [key, change] of Object.entries(data.changes_since_last)) {
            const market = data.markets[key];
            const label = marketLabels[key] || market.label;
            const prob = market.yes;
            const probClass = getProbClass(prob);

            let changeClass = 'change-neutral';
            let changeText = '→ ' + Math.abs(change).toFixed(1) + '%';
            if (change > 0) {
                changeClass = 'change-up';
                changeText = '↑ ' + change.toFixed(1) + '%';
            } else if (change < 0) {
                changeClass = 'change-down';
                changeText = '↓ ' + change.toFixed(1) + '%';
            }

            marketsContainer.innerHTML += `
                <div class="market-item">
                    <div class="market-label">${label}</div>
                    <div class="market-probability">
                        <div class="prob-bar">
                            <div class="prob-fill ${probClass}" style="width: ${prob}%"></div>
                        </div>
                        <div class="prob-value">${prob.toFixed(1)}%</div>
                        <div class="change-indicator ${changeClass}">${changeText}</div>
                    </div>
                </div>
            `;
        }

        const timestamps = data.history.map(h => formatTime(h.timestamp));
        timestamps.push(formatTime(data.timestamp));

        const wiiValues = data.history.map(h => h.wii);
        wiiValues.push(data.wii);

        const marchValues = data.history.map(h => h.markets.us_enter_iran_march31);
        marchValues.push(data.markets.us_enter_iran_march31.yes);

        const aprilValues = data.history.map(h => h.markets.us_enter_iran_april30);
        aprilValues.push(data.markets.us_enter_iran_april30.yes);

        const ceasefireValues = data.history.map(h => h.markets.ceasefire_march31);
        ceasefireValues.push(data.markets.ceasefire_march31.yes);

        const khargValues = data.history.map(h => h.markets.kharg_island_march31);
        khargValues.push(data.markets.kharg_island_march31.yes);

        const wiiCtx = document.getElementById('wiiChart').getContext('2d');
        new Chart(wiiCtx, {
            type: 'line',
            data: {
                labels: timestamps,
                datasets: [{
                    label: 'WII (战争烈度指数)',
                    data: wiiValues,
                    borderColor: '#ff416c',
                    backgroundColor: 'rgba(255, 65, 108, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: { color: '#fff' }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 40,
                        ticks: { color: '#8892b0' },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' }
                    },
                    x: {
                        ticks: { 
                            color: '#8892b0',
                            maxRotation: 45,
                            minRotation: 45
                        },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' }
                    }
                }
            }
        });

        const marketCtx = document.getElementById('marketChart').getContext('2d');
        new Chart(marketCtx, {
            type: 'line',
            data: {
                labels: timestamps,
                datasets: [
                    {
                        label: '3月底美军进入',
                        data: marchValues,
                        borderColor: '#feca57',
                        backgroundColor: 'rgba(254, 202, 87, 0.1)',
                        fill: false,
                        tension: 0.4
                    },
                    {
                        label: '4月底美军进入',
                        data: aprilValues,
                        borderColor: '#ff416c',
                        backgroundColor: 'rgba(255, 65, 108, 0.1)',
                        fill: false,
                        tension: 0.4
                    },
                    {
                        label: '3月底停火',
                        data: ceasefireValues,
                        borderColor: '#4ade80',
                        backgroundColor: 'rgba(74, 222, 128, 0.1)',
                        fill: false,
                        tension: 0.4
                    },
                    {
                        label: '哈尔格岛失控',
                        data: khargValues,
                        borderColor: '#60a5fa',
                        backgroundColor: 'rgba(96, 165, 250, 0.1)',
                        fill: false,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: { color: '#fff' }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 70,
                        ticks: { color: '#8892b0' },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' }
                    },
                    x: {
                        ticks: { 
                            color: '#8892b0',
                            maxRotation: 45,
                            minRotation: 45
                        },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' }
                    }
                }
            }
        });
    </script>
</body>
</html>
